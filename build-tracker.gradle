// Build time tracker - records every Gradle build to ~/.build-tracker/YYYY-MM-DD.csv
// Data: time, duration_ms, status, project
// View with: bt (install /usr/local/bin/bt)

import org.gradle.api.flow.*
import org.gradle.api.provider.*

def buildStartTime = System.currentTimeMillis()

abstract class BuildTimeTracker implements FlowAction<BuildTimeTracker.Params> {
    interface Params extends FlowParameters {
        @Input Property<Long> getStartTime()
        @Input Property<Boolean> getBuildFailed()
        @Input Property<String> getProjectName()
    }

    @Override
    void execute(Params params) {
        def duration = System.currentTimeMillis() - params.startTime.get()
        def status = params.buildFailed.get() ? "FAILED" : "SUCCESS"

        def now = new Date()
        def date = now.format("yyyy-MM-dd")
        def time = now.format("HH:mm:ss")

        def dataDir = new File(System.getProperty("user.home") + "/.build-tracker")
        if (!dataDir.exists()) dataDir.mkdirs()

        def csvFile = new File(dataDir, "${date}.csv")
        if (!csvFile.exists()) {
            csvFile.text = "time,duration_ms,status,project\n"
        }

        csvFile << "${time},${duration},${status},${params.projectName.get()}\n"
    }
}

gradle.settingsEvaluated { settings ->
    def flowScope = gradle.services.get(FlowScope)
    def flowProviders = gradle.services.get(FlowProviders)

    flowScope.always(BuildTimeTracker) { spec ->
        spec.parameters.startTime.set(buildStartTime)
        spec.parameters.buildFailed.set(
            flowProviders.buildWorkResult.map { it.failure.isPresent() }
        )
        spec.parameters.projectName.set(settings.rootProject.name)
    }
}
